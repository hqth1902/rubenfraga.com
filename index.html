<!doctype html>

<html lang="de">

<head>

  <meta charset="utf-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Ruben Fraga</title>
  
  <style>

    * { box-sizing: border-box; }

    body {

      margin: 0;

      min-height: 100vh;

      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

      background:

        radial-gradient(circle at top, #1451ca 0%, #1451ca 35%, #1451ca 100%);

      color: #111827;

      display: flex;

      align-items: center;

      justify-content: center;

      padding: 24px;

    }

    main {

      width: 100%;

      max-width: 420px;

      text-align: center;

    }

    .card {

      background: rgba(255, 255, 255, 0.78);

      backdrop-filter: blur(16px);

      border: 1px solid rgba(255, 255, 255, 0.7);

      border-radius: 28px;

      padding: 38px 28px;

      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.12);

    }

    h1 {

      margin: 0;

      font-size: clamp(2.2rem, 8vw, 3.4rem);

      line-height: 1;

      letter-spacing: -0.06em;

      font-weight: 800;

    }

    .subtitle {

      margin: 14px 0 30px;

      color: #6b7280;

      font-size: 1rem;

    }

    nav {

      display: grid;

      gap: 12px;

    }

    a {

      display: block;

      text-decoration: none;

      color: #111827;

      background: #ffffff;

      border: 1px solid #e5e7eb;

      border-radius: 16px;

      padding: 15px 18px;

      font-weight: 600;

      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;

    }

    a:hover {

      transform: translateY(-2px);

      border-color: #111827;

      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.10);

    }

    footer {

      margin-top: 22px;

      color: #9ca3af;

      font-size: 0.85rem;

    }

  </style>

</head>

<body>

  <main>

    <div class="card">

      <h1>Ruben Fraga</h1>

      <p class="subtitle"></p>

      <nav>

       <a href="https://www.linkedin.com/in/ruben-fraga-b2b2753b1/" target="_blank">LinkedIn</a>

      <a href="https://x.com/hqth1902" target="_blank">X</a>

      <a href="https://www.instagram.com/hqth1902/" target="_blank">Instagram</a>

      <a href="https://www.reddit.com/user/hqth1902/" target="_blank">Reddit</a>

      <a href="https://www.tiktok.com/@hqth1902" target="_blank">TikTok</a>

      </nav>

    </div>

    <footer>© 2026 Ruben Fraga</footer>

  </main>

</body>

</html>
