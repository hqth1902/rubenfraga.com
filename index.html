<!doctype html>

<html lang="de">

<head>

  <meta charset="utf-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Ruben Fraga</title>

  <style>

    body {

      margin: 0;

      min-height: 100vh;

      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

      background: #f7f7f7;

      color: #111;

      display: flex;

      align-items: center;

      justify-content: center;

    }

    main {

      text-align: center;

      padding: 2rem;

    }

    h1 {

      font-size: 2.4rem;

      margin-bottom: 0.4rem;

      font-weight: 600;

    }

    p {

      margin-bottom: 2rem;

      color: #555;

    }

    nav {

      display: flex;

      flex-direction: column;

      gap: 0.8rem;

      min-width: 220px;

    }

    a {

      text-decoration: none;

      color: #111;

      border: 1px solid #ddd;

      border-radius: 999px;

      padding: 0.8rem 1.2rem;

      background: white;

      transition: 0.2s ease;

    }

    a:hover {

      transform: translateY(-2px);

      border-color: #111;

    }

    footer {

      margin-top: 2rem;

      font-size: 0.85rem;

      color: #888;

    }

  </style>

</head>

<body>

  <main>

    <h1>Ruben Fraga</h1>

    <p>Private Homepage</p>

    <nav>

      <a href="#" target="_blank">LinkedIn</a>

      <a href="#" target="_blank">X</a>

      <a href="#" target="_blank">Instagram</a>

      <a href="#" target="_blank">Reddit</a>

      <a href="#" target="_blank">TikTok</a>

    </nav>

    <footer>

      © 2026 Ruben Fraga

    </footer>

  </main>

</body>

</html>
